name: Build EXE

# Build when you push a version tag (e.g. v1.1.0), or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # lets the release step attach files + create the release

jobs:
  build:
    runs-on: windows-latest   # Windows runner = Windows PowerShell 5.1, which ps2exe needs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version into the script
        shell: powershell
        run: |
          # github.ref_name is the tag (e.g. v1.1.0) on tag builds
          (Get-Content .\GamingOptimizerGUI.ps1 -Raw) -replace '__VERSION__', '${{ github.ref_name }}' |
            Set-Content .\GamingOptimizerGUI.ps1 -Encoding UTF8

      - name: Install ps2exe
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser

      - name: Compile GUI to EXE
        shell: powershell
        run: |
          Invoke-ps2exe .\GamingOptimizerGUI.ps1 .\GamingOptimizer.exe `
            -noConsole -requireAdmin -title "Gaming Optimizer" -product "Gaming Optimizer"

      - name: Compute SHA-256
        shell: powershell
        run: |
          $h = (Get-FileHash .\GamingOptimizer.exe -Algorithm SHA256).Hash
          Write-Host "SHA256: $h"
          $h | Out-File -Encoding ascii -NoNewline GamingOptimizer.exe.sha256

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: GamingOptimizer
          path: |
            GamingOptimizer.exe
            GamingOptimizer.exe.sha256

      - name: Attach to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-builds notes from commits since the last tag
          prerelease: false              # so the /releases/latest/ link works
          make_latest: true
          files: |
            GamingOptimizer.exe
            GamingOptimizer.exe.sha256
